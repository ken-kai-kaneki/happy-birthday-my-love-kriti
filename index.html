 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday Kriti ❤️</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: 'Poppins', sans-serif;
    }

    body, html{
        width:100%;
        height:100%;
        overflow:hidden;
    }

    .page{
        width:100%;
        height:100vh;
        display:none;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        text-align:center;
        transition:1s;
        position:absolute;
        top:0;
        left:0;
    }

    .active{
        display:flex;
    }

    /* ---------- PAGE 1 ---------- */

    #page1{
        background: linear-gradient(135deg,#ff9ec4,#ff5e9c,#ffbdd8);
        color:white;
    }

    #page1 h1{
        font-size:4rem;
        text-shadow:3px 3px 10px rgba(0,0,0,0.3);
        animation: glow 2s infinite alternate;
    }

    #startBtn{
        margin-top:30px;
        padding:15px 40px;
        border:none;
        border-radius:50px;
        font-size:1.3rem;
        cursor:pointer;
        background:white;
        color:#ff2f7d;
        font-weight:bold;
        transition:0.4s;
    }

    #startBtn:hover{
        transform:scale(1.1);
        background:#ffe4ef;
    }

    @keyframes glow{
        from{
            transform:scale(1);
        }
        to{
            transform:scale(1.08);
        }
    }

    /* ---------- PAGE 2 ---------- */

    #page2{
        background: linear-gradient(to bottom,#c9f3ff,#e5fbff);
        overflow:hidden;
        color:#004b5f;
    }

    .flowers{
        position:absolute;
        width:100%;
        height:100%;
        background-image:
        radial-gradient(pink 8%, transparent 9%),
        radial-gradient(yellow 8%, transparent 9%),
        radial-gradient(#ff7aa2 8%, transparent 9%);
        background-size:120px 120px;
        opacity:0.25;
    }

    .wish-line{
        font-size:2rem;
        width:80%;
        max-width:900px;
        z-index:2;
        margin-bottom:40px;
        font-weight:bold;
        color:#005a73;
        text-shadow:1px 1px 5px rgba(255,255,255,0.8);
    }

    .table{
        width:300px;
        height:25px;
        background:#7a4c2f;
        border-radius:10px;
        position:relative;
        z-index:2;
    }

    .table::before{
        content:'';
        position:absolute;
        width:20px;
        height:120px;
        background:#5c3823;
        left:20px;
        top:20px;
    }

    .table::after{
        content:'';
        position:absolute;
        width:20px;
        height:120px;
        background:#5c3823;
        right:20px;
        top:20px;
    }

    .cake-small{
        width:140px;
        height:90px;
        background:#ffb347;
        border-radius:10px;
        position:absolute;
        top:-90px;
        left:50%;
        transform:translateX(-50%);
        cursor:pointer;
        box-shadow:0 10px 20px rgba(0,0,0,0.2);
        transition:0.4s;
    }

    .cake-small:hover{
        transform:translateX(-50%) scale(1.1);
    }

    .cake-small::before{
        content:'';
        position:absolute;
        width:140px;
        height:25px;
        background:#ff69b4;
        top:20px;
        left:0;
    }

    .cake-small::after{
        content:'🎂';
        position:absolute;
        top:-50px;
        left:50%;
        transform:translateX(-50%);
        font-size:3rem;
    }

    /* ---------- PAGE 3 ---------- */

    #page3{
        background:linear-gradient(to bottom,#2d1606,#4d240c,#120803);
        color:white;
    }

    .big-cake{
        position:relative;
        width:320px;
        height:220px;
        background:#5a2d0c;
        border-radius:20px;
        box-shadow:0 20px 40px rgba(0,0,0,0.5);
    }

    .icing{
        position:absolute;
        width:100%;
        height:50px;
        background:#8b4513;
        border-radius:20px 20px 10px 10px;
    }

    .middle-layer{
        position:absolute;
        top:70px;
        width:100%;
        height:25px;
        background:#3e1f08;
    }

    .cake-text{
        position:absolute;
        width:100%;
        top:120px;
        text-align:center;
        font-size:1.7rem;
        color:#ffe9a3;
        font-weight:bold;
    }

    .candles{
        position:absolute;
        top:-80px;
        left:50%;
        transform:translateX(-50%);
        display:flex;
        gap:50px;
    }

    .candle{
        width:15px;
        height:70px;
        background:white;
        position:relative;
        border-radius:5px;
    }

    .flame{
        width:18px;
        height:18px;
        background:gold;
        border-radius:50%;
        position:absolute;
        top:-20px;
        left:50%;
        transform:translateX(-50%);
        animation:flicker 0.5s infinite alternate;
    }

    @keyframes flicker{
        from{
            transform:translateX(-50%) scale(1);
            opacity:1;
        }
        to{
            transform:translateX(-50%) scale(1.2);
            opacity:0.7;
        }
    }

    .numbers{
        position:absolute;
        top:-120px;
        left:50%;
        transform:translateX(-50%);
        font-size:4rem;
        font-weight:bold;
        color:#ffd700;
        letter-spacing:20px;
    }

</style>
</head>

<body>

<!-- PAGE 1 -->

<div class="page active" id="page1">
    <h1>Happy Birthday My Love Kriti ❤️</h1>
    <button id="startBtn">Happy Birthday</button>
</div>

<!-- PAGE 2 -->

<div class="page" id="page2">
    <div class="flowers"></div>

    <div class="wish-line">
        “To the most beautiful soul in my life, may your smile shine brighter than the stars today and forever. Happy 20th Birthday, Kriti ❤️”
    </div>

    <div class="table">
        <div class="cake-small" id="cakeBtn"></div>
    </div>
</div>

<!-- PAGE 3 -->

<div class="page" id="page3">

    <div class="big-cake">

        <div class="numbers">20</div>

        <div class="candles">
            <div class="candle">
                <div class="flame"></div>
            </div>

            <div class="candle">
                <div class="flame"></div>
            </div>
        </div>

        <div class="icing"></div>

        <div class="middle-layer"></div>

        <div class="cake-text">
            Happy Birthday Kriti ❤️
        </div>

    </div>

</div>

<script>

    const startBtn = document.getElementById("startBtn");
    const cakeBtn = document.getElementById("cakeBtn");

    const page1 = document.getElementById("page1");
    const page2 = document.getElementById("page2");
    const page3 = document.getElementById("page3");

    startBtn.onclick = () => {
        page1.classList.remove("active");
        page2.classList.add("active");
    }

    cakeBtn.onclick = () => {
        page2.classList.remove("active");
        page3.classList.add("active");
    }

</script>

</body>
</html>
